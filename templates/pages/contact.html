{% extends "../base.html" %}

{% block content %}
<div style="background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 3rem; width: 100%; max-width: 600px; backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); text-align: center;">
    <div style="width: 56px; height: 56px; border-radius: 12px; background: linear-gradient(135deg, #10b981, #059669); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; color: #fff; font-size: 1.5rem; font-weight: 700;">
        C
    </div>
    <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(to right, #ffffff, #d1d5db); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Contact Support</h2>
    <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 2rem;">
        Get in touch with us. Send an email or connect through the details below.
    </p>

    <div style="border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 1.5rem; margin-top: 1.5rem; text-align: left;">
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem; padding: 0.5rem 0; border-bottom: 1px solid rgba(255, 255, 255, 0.02);">
            <span style="color: var(--text-secondary);">Email:</span>
            <span style="font-family: monospace; font-weight: 600; color: var(--accent-color);">support@example.com</span>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem; padding: 0.5rem 0; border-bottom: 1px solid rgba(255, 255, 255, 0.02);">
            <span style="color: var(--text-secondary);">Phone:</span>
            <span style="font-family: monospace; font-weight: 600;">+1 (555) 019-2834</span>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem; padding: 0.5rem 0;">
            <span style="color: var(--text-secondary);">Office:</span>
            <span style="font-family: monospace; font-weight: 600;">San Francisco, CA</span>
        </div>
    </div>
    <a href="/" style="display: inline-block; margin-top: 2rem; padding: 0.75rem 1.5rem; background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border-color); border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: background 0.2s;">
        Back to Home
    </a>
</div>
{% endblock %}
